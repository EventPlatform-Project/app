server.port=8091

# --- OpenAPI / Swagger ---
# Path where springdoc exposes the raw api-docs (also aggregated by api-gateway).
springdoc.api-docs.path=/api/feedback/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Database: H2 in-memory ---
# Data lives only for the lifetime of the JVM, which is fine for a
# lightweight feedback service and removes the Postgres dependency.
# Access the H2 console (dev only) at /h2-console once enabled.
spring.datasource.url=jdbc:h2:mem:feedbackdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Enable the H2 web console at /h2-console (available INSIDE the container
# on port 8091; not exposed through the gateway).
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
