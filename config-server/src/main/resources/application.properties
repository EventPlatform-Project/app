spring.application.name=config-server
server.port=8889

spring.cloud.config.server.git.uri=${CONFIG_GIT_URI:https://github.com/EventPlatform-Project/microservices-config.git}
spring.cloud.config.server.git.default-label=${CONFIG_GIT_BRANCH:main}
spring.cloud.config.server.git.clone-on-start=true
spring.cloud.config.server.git.force-pull=true
# Optional credentials for private repos (leave blank / use env vars for public repos)
spring.cloud.config.server.git.username=${CONFIG_GIT_USERNAME:}
spring.cloud.config.server.git.password=${CONFIG_GIT_PASSWORD:}


spring.profiles.group.native=native
spring.cloud.config.server.native.search-locations=file:./config-repo,file:../config-repo

# --- Register in Eureka (optional but nice for dashboarding) ---
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,refresh
