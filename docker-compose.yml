services:
  # --- BASES DE DONNÉES ---
  postgres-db:
    image: postgres:16
    container_name: postgres-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: 12345
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
    restart: always

  mysql-db:
    image: mysql:8
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
    restart: always

  mongodb-container:
    image: mongo:latest
    container_name: mongodb-container
    ports:
      - "27017:27017"
    restart: always

  # --- MESSAGE BROKER ---
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"      # AMQP protocol
      - "15672:15672"    # Management UI (http://localhost:15672  guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  # --- KEYCLOAK ---
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: keycloak
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_URL: http://localhost:8180
    ports:
      - "8180:8180"
    volumes:
      - keycloak_data:/opt/keycloak/data
    restart: always

  # --- INFRASTRUCTURE ---
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8889:8889"
    volumes:
      - ./config-repo:/config-repo
    environment:
      SPRING_PROFILES_ACTIVE: native
      EUREKA_HOST: discovery-server
      CONFIG_LOCATION: file:/config-repo
    healthcheck:
      # Once /actuator/health returns 200, the server is fully ready to
      # serve property sources. Wget is preinstalled in eclipse-temurin.
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8889/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: always

  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      EUREKA_HOSTNAME: discovery-server
      CONFIG_SERVER_URL: http://config-server:8889
    healthcheck:
      test:
        - "CMD-SHELL"
        - "wget -qO- http://localhost:8761/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 40s
    restart: always

  # --- MICROSERVICES ---
  # All dependents wait for config-server AND discovery-server to be *healthy*
  # (not just started) so their boot logs are clean instead of full of
  # ECONNREFUSED retries.

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8888:8888"
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8889
      EUREKA_HOST: discovery-server
      KEYCLOAK_HOST: keycloak
    restart: on-failure

  users-service:
    build: ./users
    container_name: users-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_started
      keycloak:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8889
      EUREKA_HOST: discovery-server
      POSTGRES_HOST: postgres-db
      KEYCLOAK_HOST: keycloak
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
    restart: on-failure

  ms-event:
    build: ./ms-Event
    container_name: ms-event
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mysql-db:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8889
      EUREKA_HOST: discovery-server
      MYSQL_HOST: mysql-db
      MYSQL_PASSWORD: root
      KEYCLOAK_HOST: keycloak
    restart: on-failure

  ms-reservation:
    build: ./ms-Reservation
    container_name: ms-reservation
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8889
      EUREKA_HOST: discovery-server
      POSTGRES_HOST: postgres-db
      KEYCLOAK_HOST: keycloak
    restart: on-failure

  ticket-service:
    build: ./ms-tickets
    container_name: ticket-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      postgres-db:
        condition: service_started
      keycloak:
        condition: service_started
    environment:
      CONFIG_SERVER_URL: http://config-server:8889
      EUREKA_HOST: discovery-server
      POSTGRES_HOST: postgres-db
      KEYCLOAK_HOST: keycloak
    restart: on-failure

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      mongodb-container:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      # Bootstrap: only these are set here; everything else comes from
      # config-server (config-repo/notification-service.properties).
      CONFIG_SERVER_URL: http://config-server:8889
      EUREKA_HOST: discovery-server
      MONGO_HOST: mongodb-container
      RABBITMQ_HOST: rabbitmq
      # Advertise this DNS name to Eureka so other containers can reach us.
      NOTIFICATION_INSTANCE_HOST: notification-service
    ports:
      - "9000:9000"
    restart: on-failure

  # --- FRONTEND ---
  frontend:
    build: ./frontend
    container_name: frontend-dev
    ports:
      - "5173:5173"
    stdin_open: true
    tty: true
    environment:
      VITE_API_URL: http://localhost:8888
    restart: always

volumes:
  keycloak_data: