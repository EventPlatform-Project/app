server.port=7890

# --- Database ---
# Utilise POSTGRES_HOST (défini dans docker-compose) ou localhost par défaut
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/users
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- Keycloak admin client ---
# Utilise KEYCLOAK_HOST (défini dans docker-compose) ou localhost par défaut
keycloak.auth-server-url=http://${KEYCLOAK_HOST:localhost}:8180
keycloak.realm=microservices-realm
keycloak.client-id=users-service
keycloak.client-secret=TpCFGRUfybOocCOtSf4jLT3EyDkzz9Jo
keycloak.admin.username=admin
keycloak.admin.password=admin

spring.cloud.compatibility-verifier.enabled=false