server.port=8089
springdoc.api-docs.path=/api/reservations/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/reservation_event
spring.datasource.username=postgres
spring.datasource.password=12345
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update

# --- RabbitMQ (publish RESERVATION_CREATED to a topic exchange) ---
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.connection-timeout=5s
spring.rabbitmq.template.reply-timeout=5s

# Topic exchange other services (e.g. notification-service) can bind to.
app.rabbitmq.exchange=reservation.events